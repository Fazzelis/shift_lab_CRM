spring:
  application:
    name: crm
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    shift_lab.crm: DEBUG
